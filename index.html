<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack LMS</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="app">
    <!-- Menu de navigation -->
    <nav>
        <a href="#" onclick="changerPage('dashboard')"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a>
        <a href="#" onclick="changerPage('courses')"><i class="fas fa-book"></i> Cours</a>
        <a href="#" onclick="changerPage('students')"><i class="fas fa-users"></i> Apprenants</a>
        <a href="#" onclick="changerPage('progress')"><i class="fas fa-chart-line"></i> Suivi</a>
        <a href="#" onclick="changerPage('quizzes')"><i class="fas fa-puzzle-piece"></i> Quiz</a>
        <a href="#" onclick="changerPage('announcements')"><i class="fas fa-bullhorn"></i> Annonces</a>
    </nav>

    <!-- Contenu principal -->
    <main id="main-content">
        <h1>Bienvenue sur EduTrack</h1>
        <p>Chargement des données...</p>
    </main>
</div>

<!-- JavaScript -->
<script src="app.js"></script>

<script>
    // Variables globales
    let chart1 = null;
    let chart2 = null;

    // Fonction pour changer de page
    function changerPage(page) {
        const content = document.getElementById('main-content');
        switch(page) {
            case 'dashboard':
                afficherDashboard(content);
                break;
            case 'courses':
                afficherCourses(content);
                break;
            case 'students':
                afficherStudents(content);
                break;
            case 'progress':
                afficherProgress(content);
                break;
            case 'quizzes':
                afficherQuizzes(content);
                break;
            case 'announcements':
                afficherAnnouncements(content);
                break;
            default:
                afficherDashboard(content);
        }
    }

    // DASHBOARD
    function afficherDashboard(container) {
        let courses = getCourses();
        let students = getStudents();
        let enrollments = getEnrollments();
        
        let coursActifs = courses.filter(c => c.statut === 'actif').length;
        let apprenantsActifs = students.filter(s => s.statut === 'actif').length;
        let tauxCompletion = enrollments.filter(e => e.progression >= 80).length;
        
        let html = `
            <h1>Tableau de bord</h1>
            <div class="cards">
                <div class="card"><h3>${apprenantsActifs}</h3><p>Apprenants actifs</p></div>
                <div class="card"><h3>${coursActifs}</h3><p>Cours actifs</p></div>
                <div class="card"><h3>${tauxCompletion}</h3><p>Taux de complétion</p></div>
            </div>
            <div class="charts">
                <canvas id="chart-cours" width="400" height="200"></canvas>
                <canvas id="chart-inscriptions" width="400" height="200"></canvas>
            </div>
        `;
        container.innerHTML = html;
        
        // Graphiques
        let ctx1 = document.getElementById('chart-cours').getContext('2d');
        let ctx2 = document.getElementById('chart-inscriptions').getContext('2d');
        
        let nomsCours = courses.map(c => c.titre);
        let progressions = courses.map(c => c.progression);
        
        if (chart1) chart1.destroy();
        if (chart2) chart2.destroy();
        
        chart1 = new Chart(ctx1, { type: 'bar', data: { labels: nomsCours, datasets: [{ label: 'Progression (%)', data: progressions, backgroundColor: '#667eea' }] } });
        chart2 = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Terminés', 'En cours'], datasets: [{ data: [tauxCompletion, apprenantsActifs - tauxCompletion], backgroundColor: ['#28a745', '#ffc107'] }] } });
    }

    // COURS
    function afficherCourses(container) {
        let courses = getCourses();
        let html = '<h1>Gestion des cours</h1><div class="btn-ajouter" onclick="ajouterCoursUI()">+ Nouveau cours</div><div class="courses-grid">';
        courses.forEach(c => {
            html += `
                <div class="course-card">
                    <h3>${c.titre}</h3>
                    <p>${c.formateur} • ${c.niveau}</p>
                    <p>${c.duree} • ${c.inscrits} inscrits</p>
                    <div class="progress-bar"><div style="width:${c.progression}%"></div></div>
                    <button onclick="supprimerCours(${c.id})">Supprimer</button>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // APPRENANTS
    function afficherStudents(container) {
        let students = getStudents();
        let html = '<h1>Gestion des apprenants</h1><div class="btn-ajouter" onclick="ajouterStudentUI()">+ Nouvel apprenant</div><div class="students-grid">';
        students.forEach(s => {
            html += `
                <div class="student-card">
                    <img src="${s.avatar}" width="50"><h3>${s.nom}</h3><p>${s.email} • Groupe ${s.groupe}</p>
                    <button onclick="supprimerEtudiant(${s.id})">Supprimer</button>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // SUIVI PÉDAGOGIQUE
    function afficherProgress(container) {
        let enrollments = getEnrollments();
        let courses = getCourses();
        let students = getStudents();
        let html = '<h1>Suivi pédagogique</h1><table class="progress-table"><tr><th>Apprenant</th><th>Cours</th><th>Progression</th><th>Score</th></tr>';
        enrollments.forEach(e => {
            let student = students.find(s => s.id === e.studentId);
            let course = courses.find(c => c.id === e.courseId);
            if(student && course) {
                html += `<tr><td>${student.nom}</td><td>${course.titre}</td><td>${e.progression}%</td><td class="score-${e.score >= 80 ? 'good' : (e.score >= 60 ? 'mid' : 'bad')}">${e.score}%</td></tr>`;
            }
        });
        html += '</table>';
        container.innerHTML = html;
    }

    // QUIZ
    function afficherQuizzes(container) {
        let quizzes = getQuizzes();
        let html = '<h1>Quiz</h1><div class="quizzes-list">';
        quizzes.forEach(q => {
            html += `<div class="quiz-card"><h3>${q.titre}</h3><p>Durée: ${q.duree} min | Score min: ${q.scoreMin}%</p><button onclick="passerQuiz(${q.id})">Commencer</button></div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // ANNONCES
    function afficherAnnouncements(container) {
        let announcements = getAnnouncements();
        let html = '<h1>Annonces</h1><div class="btn-ajouter" onclick="ajouterAnnonceUI()">+ Nouvelle annonce</div><div class="announcements-list">';
        announcements.forEach(a => {
            html += `<div class="annonce-${a.priorite}"><h3>${a.titre}</h3><p>${a.contenu}</p><small>${new Date(a.date).toLocaleDateString()}</small></div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // UI Helper functions
    function ajouterCoursUI() {
        let titre = prompt("Titre du cours ?");
        if(titre) {
            ajouterCours({ titre, description: "", formateur: "Admin", niveau: "Débutant", categorie: "Général", statut: "actif", duree: "10h", inscrits: 0, progression: 0, modules: 1 });
            changerPage('courses');
        }
    }
    function ajouterStudentUI() {
        let nom = prompt("Nom de l'apprenant ?");
        if(nom) {
            ajouterEtudiant({ nom, email: prompt("Email ?"), groupe: prompt("Groupe ?"), statut: "actif", avatar: "https://randomuser.me/api/portraits/lego/1.jpg" });
            changerPage('students');
        }
    }
    function ajouterAnnonceUI() {
        let titre = prompt("Titre de l'annonce ?");
        if(titre) {
            ajouterAnnonce({ titre, contenu: prompt("Contenu ?"), priorite: "normal", auteur: "Admin", coursId: null });
            changerPage('announcements');
        }
    }
    function passerQuiz(id) {
        alert("Fonctionnalité quiz à implémenter");
    }

    // Chargement initial
    window.onload = () => {
        changerPage('dashboard');
    };

    // Exposer les fonctions UI
    window.changerPage = changerPage;
    window.ajouterCoursUI = ajouterCoursUI;
    window.ajouterStudentUI = ajouterStudentUI;
    window.ajouterAnnonceUI = ajouterAnnonceUI;
    window.passerQuiz = passerQuiz;
    window.supprimerCours = supprimerCours;
    window.supprimerEtudiant = supprimerEtudiant;
</script>

</body>
</html>
